# Combined Link Hints (Standard + Google)
# Cmd-click to open URLs

# Standard URLs
[[hints.enabled]]
command = "open"
hyperlinks = true
post_processing = true
mouse.enabled = true
mouse.mods = "Command"
regex = "(ipfs:|ipns:|magnet:|mailto:|gemini://|gopher://|https://|http://|news:|file:|git://|ssh:|ftp://)[^\u0000-\u001F\u007F-\u009F<>\"\\s{-}\\^()`\\\\]+"

# Google: b/123
[[hints.enabled]]
command = { program = "sh", args = ["-c", "open https://b.corp.google.com/${1#b/}", "--"] }
mouse.enabled = true
mouse.mods = "Command"
regex = "(?-u:\\b)b/\\d+(?-u:\\b)"

